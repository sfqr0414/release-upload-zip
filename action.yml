name: 'release-upload-zip'
inputs:
  zip_path:
    required: true
  release_tag:
    required: true
  github_token:
    required: true
runs:
  using: composite
  steps:
    - run: |
        if ! gh release view ${{ inputs.release_tag }} >/dev/null 2>&1; then
          gh release create ${{ inputs.release_tag }} --title "${{ inputs.release_tag }}" --notes "Auto-generated release" --draft=false --prerelease=false
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
    - id: get-size
      run: echo "size=$(stat -c %s ${{ inputs.zip_path }})" >> $GITHUB_OUTPUT
      shell: bash
    - if: ${{ steps.get-size.outputs.size >= 2147483648 }}
      run: split -b 1900M -d -a 3 ${{ inputs.zip_path }} ${{ inputs.zip_path }}.part-
      shell: bash
    - if: ${{ steps.get-size.outputs.size < 2147483648 }}
      run: gh release upload ${{ inputs.release_tag }} ${{ inputs.zip_path }} --clobber
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
    - if: ${{ steps.get-size.outputs.size >= 2147483648 }}
      run: gh release upload ${{ inputs.release_tag }} ${{ inputs.zip_path }}.part-* --clobber
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
